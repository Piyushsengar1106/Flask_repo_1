<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f64f59 100%);
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px !important;
            box-shadow:
                0 32px 64px rgba(0, 0, 0, 0.2),
                0 8px 16px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.6) !important;
            animation: card-enter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f64f59);
        }

        @keyframes card-enter {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }

        .bg-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.5), 0 0 0 5px rgba(102, 126, 234, 0.15);
            animation: avatar-glow 3s ease-in-out infinite;
        }

        @keyframes avatar-glow {
            0%, 100% { box-shadow: 0 8px 24px rgba(102, 126, 234, 0.5), 0 0 0 5px rgba(102, 126, 234, 0.15); }
            50%       { box-shadow: 0 8px 32px rgba(102, 126, 234, 0.7), 0 0 0 9px rgba(102, 126, 234, 0.08); }
        }

        h3.fw-bold {
            background: linear-gradient(135deg, #1a1a2e 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.72rem 1.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6b3f9a 100%);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.55);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f64f59 0%, #c0392b 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(246, 79, 89, 0.35);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #e8404a 0%, #a93226 100%);
            box-shadow: 0 8px 25px rgba(246, 79, 89, 0.5);
        }

        .btn-outline-secondary {
            background: rgba(107, 114, 128, 0.07);
            border: 1.5px solid rgba(107, 114, 128, 0.3) !important;
            color: #6b7280;
        }

        .btn-outline-secondary:hover {
            background: rgba(107, 114, 128, 0.14);
            border-color: rgba(107, 114, 128, 0.45) !important;
            color: #374151;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.35);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.5);
        }

        .d-grid form { width: 100%; }
    </style>
</head>

<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5 text-center">

                        <!-- Avatar -->
                        <div class="mb-4">
                            <div class="bg-primary text-white rounded-circle d-inline-flex 
                                    align-items-center justify-content-center"
                                style="width:80px;height:80px;font-size:30px;">
                                {{ current_user[0].upper() }}
                            </div>
                        </div>

                        <h3 class="fw-bold mb-3">
                            Welcome, {{ current_user }}
                        </h3>

                        <p class="text-muted mb-4">
                            Manage your account settings below.
                        </p>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-3">

                            <form method="get" action="/update_email/{{ user_id }}">
                                <button class="btn btn-primary rounded-pill">
                                    Update Email
                                </button>
                            </form>

                            <form method="post" action="/delete_account/{{ user_id }}">
                                <button class="btn btn-danger rounded-pill">
                                    Delete Account
                                </button>
                            </form>

                            <form method="post" action="/logout">
                                <button class="btn btn-outline-secondary rounded-pill">
                                    Logout
                                </button>
                            </form>

                            <a href="{{ url_for('fetch_all') }}" class="btn btn-success rounded-pill">
                                View All Users
                            </a>

                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
