<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Posts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .no-posts {
            background: #ffffff;
            text-align: center;
            padding: 48px;
            border-radius: 16px;
            color: #718096;
            font-size: 1.1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 28px 32px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
        }

        .post-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .post-meta {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 14px;
            display: flex;
            gap: 16px;
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .post-content {
            font-size: 0.97rem;
            color: #4a5568;
            line-height: 1.7;
        }

        .post-footer {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 7px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.1s;
            display: inline-block;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
        }

        .btn-danger {
            background: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>All Posts</h1>

        {% if posts %}
            <div class="posts-list">
                {% for post in posts %}
                    <div class="post-card">
                        <div class="post-title">{{ post.title }}</div>
                        <div class="post-meta">
                            {% if post.author %}
                                <span>By {{ post.author }}</span>
                            {% endif %}
                            {% if post.date_posted %}
                                <span>{{ post.date_posted.strftime('%B %d, %Y') }}</span>
                            {% endif %}
                        </div>
                        <div class="post-content">{{ post.content }}</div>
                        <div class="post-footer">
                            <a href="/post/{{ post.id }}" class="btn btn-primary">View</a>
                            <a href="/post/{{ post.id }}/edit" class="btn btn-danger">Edit</a>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="no-posts">No posts found.</div>
        {% endif %}
    </div>
</body>
</html>
